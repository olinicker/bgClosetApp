version: '3.8'

services:
  frontend:
    build: ./bgcloset-app
    container_name: frontend
    ports:
      - "3000:80"
    networks:
      - app-network
    depends_on:
      - api

  api:
    build: ./bgcloset-api
    container_name: api
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - app-network
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: db
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: